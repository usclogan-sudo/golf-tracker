name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          export VITE_SUPABASE_URL=$(echo "$RAW_URL" | tr -d '\r\n ')
          export VITE_SUPABASE_ANON_KEY=$(echo "$RAW_KEY" | tr -d '\r\n ')
          export VITE_GOLF_COURSE_API_KEY=$(echo "$RAW_GOLF_KEY" | tr -d '\r\n ')
          npm run build
        env:
          RAW_URL: ${{ vars.VITE_SUPABASE_URL }}
          RAW_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          RAW_GOLF_KEY: ${{ vars.VITE_GOLF_COURSE_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
