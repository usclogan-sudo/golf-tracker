name: Deploy to GitHub Pages

# DISABLED 2026-06-29: production migrated to Vercel (root-path build).
# The Vite base is now '/', which is incompatible with GitHub Pages' '/golf-tracker/'
# subpath, so this pipeline would publish a broken build. Kept as manual-only
# (workflow_dispatch) for rollback; the auto push trigger is removed to avoid
# double-deploying against Vercel. To re-enable, restore `push: branches: [main]`.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        # npm install (not ci) — tolerates the optional-platform-binary
        # serialization mismatch between the lockfile authored under npm 11
        # and CI's installer. Slightly less hermetic, but stable.
        run: npm install --no-audit --no-fund

      - name: Build
        run: |
          export VITE_SUPABASE_URL=$(echo "$RAW_URL" | tr -d '\r\n ')
          export VITE_SUPABASE_ANON_KEY=$(echo "$RAW_KEY" | tr -d '\r\n ')
          export VITE_GOLF_COURSE_API_KEY=$(echo "$RAW_GOLF_KEY" | tr -d '\r\n ')
          export VITE_SENTRY_DSN=$(echo "$RAW_SENTRY_DSN" | tr -d '\r\n ')
          npm run build
        env:
          RAW_URL: ${{ vars.VITE_SUPABASE_URL }}
          RAW_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          RAW_GOLF_KEY: ${{ vars.VITE_GOLF_COURSE_API_KEY }}
          RAW_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
