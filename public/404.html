<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA-routing fallback. On Vercel this file is never
      // served because vercel.json rewrites all unknown paths to index.html
      // natively. Kept for safety in case it ever needs to fall back.
      window.location.replace(
        '/' + window.location.hash
      );
    </script>
  </head>
  <body></body>
</html>
