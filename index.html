<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1f2937" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fore Skins" />
    <meta name="description" content="Golf side games, money, and scores — all in one place." />
    <link rel="manifest" href="/golf-tracker/manifest.json" />
    <link rel="apple-touch-icon" href="/golf-tracker/icon-192.png" />
    <!-- iOS splash screens -->
    <link rel="apple-touch-startup-image" href="/golf-tracker/splash-se.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/golf-tracker/splash-standard.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/golf-tracker/splash-standard.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/golf-tracker/splash-promax.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <title>Fore Skins Golf</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:monospace"><h1 style="color:red">JS Error</h1><pre>' + msg + '\n' + (src||'') + ':' + line + ':' + col + '\n' + (err && err.stack ? err.stack : '') + '</pre></div>';
      };
      window.onunhandledrejection = function(e) {
        document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:monospace"><h1 style="color:red">Promise Error</h1><pre>' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '</pre></div>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
